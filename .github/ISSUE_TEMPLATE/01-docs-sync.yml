name: Docs sync
description: An upstream fsd.how page changed, was added, or was removed, and this skill needs to be updated to match.
title: "docs: Sync with fsd.how: "
labels: ["docs-sync"]
body:
  - type: input
    id: upstream-url
    attributes:
      label: Upstream URL
      description: The fsd.how page this issue is about.
      placeholder: https://fsd.how/docs/reference/slices-segments/
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Type of upstream change
      options:
        - Existing page was revised
        - New page was added
        - Page was renamed or moved
        - Page was removed
    validations:
      required: true

  - type: dropdown
    id: target-file
    attributes:
      label: Files in this repo that likely need updates
      multiple: true
      options:
        - SKILL.md
        - references/layer-structure.md
        - references/cross-import-patterns.md
        - references/migration-guide.md
        - references/framework-integration.md
        - references/practical-examples.md
        - A new reference file may be needed
        - Not sure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary of the upstream change
      description: Describe what changed on fsd.how. Renames, new sections, revised examples, or removed content.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Suggested changes in this repo
      description: Optional. Rough notes, bullet points, or a sketch of the diff are all fine.
