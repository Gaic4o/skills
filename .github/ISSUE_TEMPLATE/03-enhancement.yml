name: Enhancement
description: Propose a new section, reference file, or pattern guide that is not directly driven by an upstream fsd.how change.
title: "feat: Enhancement: "
labels: ["enhancement"]
body:
  - type: textarea
    id: gap
    attributes:
      label: What is not currently covered
      description: Describe the pattern, scenario, or question this skill does not handle well today.
    validations:
      required: true

  - type: dropdown
    id: location
    attributes:
      label: Where it should live
      options:
        - New section in SKILL.md
        - New section in an existing reference file
        - New reference file
        - Not sure yet
    validations:
      required: true

  - type: input
    id: upstream
    attributes:
      label: Related reference
      description: Optional. Link to an fsd.how page, Steiger rule, or community post that supports this.

  - type: textarea
    id: rationale
    attributes:
      label: Why it matters
      description: How often does this come up, and what tends to go wrong without this guidance?
    validations:
      required: true
